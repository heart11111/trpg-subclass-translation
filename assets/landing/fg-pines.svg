<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1080" preserveAspectRatio="xMinYMax slice">
  <!-- Foreground occluder: chunky storybook pine cluster on a solid ground mass.
       Used on the left edge as-is and mirrored (scaleX -1) on the right edge.
       The ground block is solid to the bottom so nothing shows through. -->
  <defs>
    <linearGradient id="pineFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171027"/>
      <stop offset="1" stop-color="#0d0918"/>
    </linearGradient>
  </defs>

  <g fill="url(#pineFill)">
    <!-- solid ground mass -->
    <path d="M0 1080 L0 800 Q80 762 156 792 Q238 758 316 790 Q396 766 458 802 Q520 786 566 822 L608 1080 Z"/>
    <path d="M420 1080 L440 880 Q520 838 600 878 Q660 854 704 900 L720 926 L720 1080 Z"/>
    <!-- big pine (trunk sinks into the ground mass) -->
    <path d="M186 28
             L296 234 L258 226 L282 262 L330 356 L286 346 L316 396 L368 500 L312 488 L348 546 L404 656 L336 640 L376 706 L430 812
             L262 812 L262 880 L118 880 L118 812
             L-58 812 L-4 706 L36 640 L-32 656 L24 546 L60 488 L4 500 L56 396 L86 346 L42 356 L90 262 L114 226 L76 234 Z"/>
    <!-- companion pine -->
    <path d="M488 420
             L566 566 L538 560 L556 590 L604 682 L568 674 L590 712 L638 806
             L520 806 L520 860 L448 860 L448 806
             L338 806 L386 712 L408 674 L372 682 L420 590 L438 560 L410 566 Z"/>
  </g>

  <!-- moonlit rim hints on the lit side of the pines -->
  <g fill="none" stroke="#8f78c0" stroke-opacity=".28" stroke-width="5" stroke-linecap="round">
    <path d="M296 234 L282 262 L330 356"/>
    <path d="M368 500 L348 546 L404 656"/>
    <path d="M566 566 L556 590 L604 682"/>
  </g>

  <!-- fireflies -->
  <g fill="#ffd98a">
    <circle cx="330" cy="744" r="5" opacity=".8"/>
    <circle cx="472" cy="628" r="3.4" opacity=".55"/>
    <circle cx="560" cy="884" r="4" opacity=".65"/>
  </g>
</svg>
